<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.0">
  <title>F.C.E.T. EDITOR · Professional IDE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="file-input-bar">
    <button class="explorer-toggle-btn" id="explorerToggleBtn" title="Toggle Explorer">
      <i class="fas fa-bars"></i>
    </button>
    <div class="file-path-display" id="filePathDisplay">
      <i class="fas fa-file-code file-icon-sm"></i>
      <span class="path-text" id="pathText">No file open</span>
    </div>
    <button class="search-icon-btn" id="searchToggleBtn" title="Search">
      <i class="fas fa-search"></i>
    </button>
    <button class="run-icon-btn" id="runIconBtn" title="Run">
      <i class="fas fa-play"></i>
    </button>
    <div class="dropdown-icon-btn" id="moreOptionsBtn">
      <i class="fas fa-ellipsis-v"></i>
      <div class="mini-dropdown" id="miniDropdown">
        <button class="mini-item" data-action="save"><i class="fas fa-save"></i> Save</button>
        <button class="mini-item" data-action="saveAs"><i class="fas fa-file-export"></i> Save As</button>
        <button class="mini-item" data-action="delete"><i class="fas fa-trash"></i> Delete</button>
        <button class="mini-item" data-action="downloadAll"><i class="fas fa-download"></i> Download All</button>
        <button class="mini-item" data-action="clearEditor"><i class="fas fa-eraser"></i> Clear</button>
      </div>
    </div>
    <div class="search-dropdown-bar" id="searchDropdownBar">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search files...">
    </div>
  </div>

  <div class="main-area">
    <div class="explorer-backdrop" id="explorerBackdrop"></div>
    <aside class="explorer-overlay" id="explorerOverlay">
      <div class="explorer-header">
        <div class="explorer-title">
          <i class="fas fa-code"></i> F.C.E.T CODE EDITOR
        </div>
        <div class="explorer-actions-row">
          <span class="explorer-label">FILE</span>
          <button class="icon-btn" id="newFileBtn" title="New File">
            <i class="fas fa-file-plus"></i>
          </button>
          <button class="icon-btn" id="newFolderBtn" title="New Folder">
            <i class="fas fa-folder-plus"></i>
          </button>
          <div class="icon-btn" id="explorerMoreBtn" style="position:relative;" title="More">
            <i class="fas fa-ellipsis-v"></i>
            <div class="explorer-more-dropdown" id="explorerMoreDropdown">
              <button class="explorer-more-item" data-action="importZip">
                <i class="fas fa-file-archive"></i> Import ZIP
              </button>
              <button class="explorer-more-item" data-action="importFile">
                <i class="fas fa-file-import"></i> Import File
              </button>
              <button class="explorer-more-item" data-action="undo">
                <i class="fas fa-undo"></i> Undo
              </button>
              <button class="explorer-more-item" data-action="redo">
                <i class="fas fa-redo"></i> Redo
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="explorer-tree" id="explorerTree"></div>
    </aside>

    <div class="editor-panel">
      <div class="editor-header">
        <span><i class="fas fa-edit"></i> Editor</span>
        <span class="editor-hint">Ctrl+Enter to run</span>
      </div>
      <div class="editor-wrap">
        <textarea id="codeEditor" placeholder="Click File → New File to start coding..." spellcheck="false" disabled></textarea>
      </div>
      <div class="bottom-toolbar-wrap">
        <div class="bottom-toolbar" id="bottomToolbar">
          <button class="tool-btn" id="tabBtn" title="Tab">
            <i class="fas fa-arrow-right-to-bracket"></i>
          </button>
          <span class="tool-divider"></span>
          <button class="tool-btn" id="arrowUpBtn" title="Up">
            <i class="fas fa-arrow-up"></i>
          </button>
          <button class="tool-btn" id="arrowDownBtn" title="Down">
            <i class="fas fa-arrow-down"></i>
          </button>
          <button class="tool-btn" id="arrowLeftBtn" title="Left">
            <i class="fas fa-arrow-left"></i>
          </button>
          <button class="tool-btn" id="arrowRightBtn" title="Right">
            <i class="fas fa-arrow-right"></i>
          </button>
          <span class="tool-divider"></span>
          <button class="tool-btn" id="undoBtn" title="Undo">
            <i class="fas fa-undo"></i>
          </button>
          <button class="tool-btn" id="redoBtn" title="Redo">
            <i class="fas fa-redo"></i>
          </button>
          <span class="tool-divider"></span>
          <button class="tool-btn" id="copySelectionBtn" title="Copy">
            <i class="fas fa-copy"></i>
          </button>
          <button class="tool-btn" id="cutBtn" title="Cut">
            <i class="fas fa-cut"></i>
          </button>
          <button class="tool-btn" id="pasteBtn" title="Paste">
            <i class="fas fa-paste"></i>
          </button>
          <span class="tool-divider"></span>
          <button class="tool-btn highlight" id="saveBtn" title="Save">
            <i class="fas fa-save"></i>
          </button>
          <button class="tool-btn" id="saveAsBtn" title="Save As">
            <i class="fas fa-file-export"></i>
          </button>
          <button class="tool-btn" id="aiBtn" title="AI Assistant">
            <i class="fas fa-robot"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="output-overlay" id="outputOverlay">
    <div class="output-header">
      <span class="output-title"><i class="fas fa-eye"></i> Output</span>
      <button class="close-btn" id="closeOutputBtn">✕</button>
    </div>
    <div class="output-iframe-wrap">
      <iframe id="outputFrame" sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-popups"></iframe>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <label id="modalLabel">New File</label>
      <input type="text" id="modalInput" placeholder="filename.html" autocomplete="off">
      <div class="modal-buttons">
        <button id="modalConfirm">Create</button>
        <button id="modalCancel">Cancel</button>
      </div>
    </div>
  </div>

  <div class="context-menu" id="contextMenu"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
