<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>F.C.E.T. EDITOR · Professional IDE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      background: #0b0f17;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      color: #d3d9e6;
    }

    .file-input-bar {
      background: #131a27;
      border-bottom: 1px solid #21262d;
      padding: 0.45rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-shrink: 0;
      z-index: 24;
      position: relative;
    }
    .explorer-toggle-btn {
      background: #1c2436;
      border: 1px solid #323b51;
      color: #d3d9e6;
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      flex-shrink: 0;
    }
    .explorer-toggle-btn:hover {
      background: #2e3a50;
      border-color: #5f76d0;
    }
    .file-path-display {
      flex: 1;
      background: #0f1520;
      border: 1px solid #2c3548;
      border-radius: 0.5rem;
      padding: 0.45rem 1rem;
      color: #e1e8ff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;

    .file-path-display .file-icon-sm {

      font-size: 0.85rem;
    }
    .file-path-display .path-text {

      text-overflow: ellipsis;
    }
    .search-icon-btn {
      background: #1c2436;
      border: 1px solid #323b51;
      color: #d3d9e6;
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      flex-shrink: 0;
    }
    .search-icon-btn:hover {

      border-color: #5f76d0;
    }
    .search-icon-btn.active {
      background: #2d3f8c;
      border-color: #4b6cf7;
      color: white;
    }
    .run-icon-btn {
      background: #2d3f8c;
      border: 1px solid #4b6cf7;
      color: white;
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      flex-shrink: 0;
    }
    .run-icon-btn:hover {
      background: #3c4fae;
      box-shadow: 0 0 15px #3040a0;
    }
    .dropdown-icon-btn {
      background: #1c2436;
      border: 1px solid #323b51;
      color: #d3d9e6;
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      flex-shrink: 0;
      position: relative;
    }
    .dropdown-icon-btn:hover {
      background: #2e3a50;
    }
    .mini-dropdown {
      position: absolute;
      top: 110%;
      right: 0;
      background: #1c2436;
      border: 1px solid #3b435a;
      border-radius: 0.7rem;

      display: none;

      box-shadow: 0 8px 20px rgba(0,0,0,0.7);

    .mini-dropdown.show {

    }
    .mini-item {

      border: none;
      color: #d3d9e6;
      padding: 0.4rem 0.8rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .mini-item:hover {
      background: #2e3a50;
      color: white;
    }

    .search-dropdown-bar {

      top: 100%;
      right: 4.8rem;
      background: #131a27;
      border: 1px solid #21262d;
      border-top: none;
      border-radius: 0 0 0.7rem 0.7rem;
      padding: 0.5rem 0.8rem;

      gap: 0.4rem;

    }
    .search-dropdown-bar.show {

    }
    .search-dropdown-bar input {

    }
    .search-dropdown-bar i {

      font-size: 0.8rem;
    }

    .main-area {

      display: flex;
      overflow: hidden;
      position: relative;
      background: #0c101a;
    }

    .explorer-overlay {

      left: 0;
      bottom: 0;

      background: #111827;
      border-right: 1px solid #2c3548;

      z-index: 39;
      opacity: 0;
      pointer-events: none;

    }
    .explorer-backdrop.active {

      pointer-events: auto;
    }
    .explorer-header {
      padding: 1rem;
      background: #1a1f30;
      border-bottom: 1px solid #2c3548;
      flex-shrink: 0;
    }
    .explorer-title {

      color: #4a6cf7;

      letter-spacing: 1px;
      margin-bottom: 0.8rem;

    .explorer-actions-row {

    .explorer-label {

      letter-spacing: 1px;

    .explorer-header .icon-btn {

      border: 1px solid #323b51;
      color: #d3d9e6;
      width: 2rem;
      height: 2rem;
      border-radius: 0.4rem;
      cursor: pointer;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      position: relative;
    }
    .explorer-header .icon-btn:hover {
      background: #2e3a50;
      border-color: #5f76d0;
      color: white;
    }
    .explorer-more-dropdown {
      position: absolute;
      top: 110%;
      right: 0;
      background: #1c2436;
      border: 1px solid #3b435a;
      border-radius: 0.7rem;
      padding: 0.3rem;
      display: none;
      flex-direction: column;
      gap: 0.1rem;
      z-index: 45;
      min-width: 140px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.7);
    }
    .explorer-more-dropdown.show {
      display: flex;
    }
    .explorer-more-item {
      background: transparent;
      border: none;
      color: #d3d9e6;
      padding: 0.4rem 0.8rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .explorer-more-item:hover {
      background: #2e3a50;
      color: white;
    }
    .explorer-tree {

      overflow-y: auto;
      padding: 0.5rem;
      font-size: 0.82rem;
      display: flex;
      flex-direction: column;

      font-style: italic;
      font-size: 0.85rem;

      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 0.5rem;
      padding: 2rem;
    }
    .tree-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.5rem;
      border-radius: 0.4rem;
      cursor: pointer;
      transition: 0.12s;
      white-space: nowrap;
      position: relative;

    .tree-item:hover {
      background: #1e2a40;
    }
    .tree-item.active {
      background: #2d3f6b;
      color: white;
    }
    .tree-item i {
      width: 1.1rem;
      text-align: center;
      font-size: 0.8rem;
    }
    .tree-item .folder-icon {
      color: #e2b04a;
    }
    .tree-item .file-icon.html {
      color: #e44d26;
    }
    .tree-item .file-icon.css {
      color: #264de4;
    }
    .tree-item .file-icon.js {
      color: #f0db4f;
    }
    .tree-item .file-icon.py {
      color: #3572a5;
    }
    .tree-item .file-icon.md {
      color: #6d8cc7;
    }
    .tree-item .file-icon.default {
      color: #8899cc;
    }
    .tree-children {
      padding-left: 1rem;
    }
    .tree-item .arrow {
      font-size: 0.55rem;
      width: 0.7rem;
      transition: 0.2s;
    }
    .tree-item .arrow.expanded {
      transform: rotate(90deg);
    }
    .tree-item .three-dot {
      margin-left: auto;
      opacity: 1;
      cursor: pointer;
      padding: 0.15rem 0.3rem;
      border-radius: 0.3rem;
      color: #8899cc;
      font-size: 0.7rem;
      position: relative;
    }
    .tree-item .three-dot:hover {
      background: #3b435a;
      color: white;
    }

    .context-menu {
      position: fixed;
      background: #1c2436;
      border: 1px solid #4a6cf7;
      border-radius: 0.7rem;
      padding: 0.3rem;
      z-index: 70;
      display: none;
      flex-direction: column;
      gap: 0.1rem;
      min-width: 150px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }
    .context-menu.show {
      display: flex;
    }
    .context-item {
      background: transparent;
      border: none;
      color: #d3d9e6;
      padding: 0.4rem 0.7rem;
      border-radius: 0.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      transition: 0.15s;
      flex-direction: row;
      text-align: left;
    }
    .context-item i {
      order: -1;
      width: 1.1rem;
      text-align: center;
    }
    .context-item:hover {
      background: #2e3a50;
      color: white;
    }
    .context-separator {
      height: 1px;
      background: #323b51;
      margin: 0.2rem 0.5rem;
    }

    .editor-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #151d2b;
      margin: 0.4rem;
      border-radius: 0.8rem;
      border: 1px solid #2c3444;
      overflow: hidden;
    }
    .editor-header {
      padding: 0.35rem 1rem;
      background: rgba(20,27,40,0.8);
      border-bottom: 1px solid #2f3a52;
      font-weight: 600;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #bdc8e0;
    }
    .editor-wrap {
      flex: 1;
      display: flex;
    }
    textarea {
      width: 100%;
      height: 100%;
      background: #0f1520;
      border: none;
      resize: none;
      padding: 1rem;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.9rem;
      line-height: 1.6;
      color: #e1e8ff;
      caret-color: #5b7bff;
      outline: none;
      white-space: pre-wrap;
      word-break: break-word;
      overflow: auto;
    }
    textarea::placeholder {
      color: #4a5570;
    }

    .bottom-toolbar {
      background: #131a27;
      border-top: 1px solid #21262d;
      padding: 0.35rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      overflow-x: auto;
      flex-shrink: 0;
    }
    .tool-btn {
      background: #1c2436;
      border: 1px solid #323b51;
      color: #d3d9e6;
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.8rem;
      flex-shrink: 0;
    }
    .tool-btn:hover {
      background: #2e3a50;
      border-color: #5f76d0;
      color: white;
    }
    .tool-divider {
      width: 1px;
      height: 1.3rem;
      background: #323b51;
      margin: 0 0.15rem;
      flex-shrink: 0;
    }

    .output-overlay {
      position: fixed;
      top: 8px;
      left: 8px;
      right: 8px;
      bottom: 8px;
      background: #fff;
      border-radius: 1.2rem;
      border: 2px solid #4a6cf7;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transform: scale(0.96);
      transition: 0.25s;
    }
    .output-overlay.active {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }
    .output-header {
      background: #1e2537;
      padding: 0.45rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .output-title {
      font-weight: 600;
      color: #cdd6f0;
      font-size: 0.85rem;
    }
    .close-btn {
      background: #ff4757;
      border: none;
      color: white;
      width: 1.8rem;
      height: 1.8rem;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: bold;
    }
    .close-btn:hover {
      background: #ff6b7a;
    }
    .output-iframe-wrap {
      flex: 1;
      overflow: auto;
      background: #f8f9fc;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: 0.2s;
    }
    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-box {
      background: #1c2436;
      border: 1px solid #4a6cf7;
      border-radius: 1rem;
      padding: 1.2rem;
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }
    .modal-box input {
      background: #0f1520;
      border: 1px solid #38415a;
      color: white;
      padding: 0.5rem 0.8rem;
      border-radius: 1.5rem;
      outline: none;
    }
    .modal-box button {
      background: #4a6cf7;
      border: none;
      color: white;
      padding: 0.5rem;
      border-radius: 1.5rem;
      cursor: pointer;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="file-input-bar">
    <button class="explorer-toggle-btn" id="explorerToggleBtn" title="Toggle Explorer"><i class="fas fa-bars"></i></button>
    <div class="file-path-display" id="filePathDisplay">
      <i class="fas fa-file-code file-icon-sm"></i>
      <span class="path-text" id="pathText">No file open</span>
    </div>
    <button class="search-icon-btn" id="searchToggleBtn" title="Search"><i class="fas fa-search"></i></button>
    <button class="run-icon-btn" id="runIconBtn" title="Run"><i class="fas fa-play"></i></button>
    <div class="dropdown-icon-btn" id="moreOptionsBtn">
      <i class="fas fa-ellipsis-v"></i>
      <div class="mini-dropdown" id="miniDropdown">
        <button class="mini-item" data-action="save"><i class="fas fa-save"></i> Save</button>
        <button class="mini-item" data-action="saveAs"><i class="fas fa-file-export"></i> Save As</button>
        <button class="mini-item" data-action="delete"><i class="fas fa-trash"></i> Delete</button>
        <button class="mini-item" data-action="downloadAll"><i class="fas fa-download"></i> Download All</button>
        <button class="mini-item" data-action="clearEditor"><i class="fas fa-eraser"></i> Clear</button>
      </div>
    </div>
    <div class="search-dropdown-bar" id="searchDropdownBar">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search files...">
    </div>
  </div>

  <div class="main-area">
    <div class="explorer-backdrop" id="explorerBackdrop"></div>
    <aside class="explorer-overlay" id="explorerOverlay">
      <div class="explorer-header">
        <div class="explorer-title">
          <i class="fas fa-code"></i> F.C.E.T CODE EDITOR
        </div>
        <div class="explorer-actions-row">
          <span class="explorer-label">FILE</span>
          <button class="icon-btn" id="newFileBtn" title="New File"><i class="fas fa-file-plus"></i></button>
          <button class="icon-btn" id="newFolderBtn" title="New Folder"><i class="fas fa-folder-plus"></i></button>
          <div class="icon-btn" id="explorerMoreBtn" style="position:relative;" title="More">
            <i class="fas fa-ellipsis-v"></i>
            <div class="explorer-more-dropdown" id="explorerMoreDropdown">
              <button class="explorer-more-item" data-action="importFile"><i class="fas fa-file-import"></i> Import</button>
              <button class="explorer-more-item" data-action="undo"><i class="fas fa-undo"></i> Undo</button>
              <button class="explorer-more-item" data-action="redo"><i class="fas fa-redo"></i> Redo</button>
            </div>
          </div>
        </div>
      </div>
      <div class="explorer-tree" id="explorerTree"></div>
    </aside>

    <div class="editor-panel">
      <div class="editor-header">
        <span><i class="fas fa-edit"></i> Editor</span>
        <span style="font-size:0.65rem;opacity:0.6;">Ctrl+Enter to run</span>
      </div>
      <div class="editor-wrap">
        <textarea id="codeEditor" placeholder="Create or select a file to start coding..." spellcheck="false"></textarea>
      </div>
      <div class="bottom-toolbar">
        <button class="tool-btn" id="arrowUpBtn"><i class="fas fa-arrow-up"></i></button>
        <button class="tool-btn" id="arrowDownBtn"><i class="fas fa-arrow-down"></i></button>
        <button class="tool-btn" id="arrowLeftBtn"><i class="fas fa-arrow-left"></i></button>
        <button class="tool-btn" id="arrowRightBtn"><i class="fas fa-arrow-right"></i></button>
        <span class="tool-divider"></span>
        <button class="tool-btn" id="undoBtn"><i class="fas fa-undo"></i></button>
        <button class="tool-btn" id="redoBtn"><i class="fas fa-redo"></i></button>
        <span class="tool-divider"></span>
        <button class="tool-btn" id="copySelectionBtn"><i class="fas fa-copy"></i></button>
        <button class="tool-btn" id="cutBtn"><i class="fas fa-cut"></i></button>
        <button class="tool-btn" id="pasteBtn"><i class="fas fa-paste"></i></button>
      </div>
    </div>
  </div>

  <div class="output-overlay" id="outputOverlay">
    <div class="output-header">
      <span class="output-title"><i class="fas fa-eye"></i> Output</span>
      <button class="close-btn" id="closeOutputBtn">✕</button>
    </div>
    <div class="output-iframe-wrap"><iframe id="outputFrame" sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-popups"></iframe></div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <label style="color:#cdd6f0;font-weight:600;" id="modalLabel">New File</label>
      <input type="text" id="modalInput" placeholder="filename.html">
      <div style="display:flex;gap:0.4rem;">
        <button id="modalConfirm">Create</button>
        <button style="background:#3b435a;" id="modalCancel">Cancel</button>
      </div>
    </div>
  </div>

  <div class="context-menu" id="contextMenu"></div>

  <script>
    (function() {
      const editor = document.getElementById('codeEditor');
      const pathText = document.getElementById('pathText');
      const explorerTree = document.getElementById('explorerTree');
      const explorerOverlay = document.getElementById('explorerOverlay');
      const explorerBackdrop = document.getElementById('explorerBackdrop');
      const outputOverlay = document.getElementById('outputOverlay');
      const outputFrame = document.getElementById('outputFrame');
      const miniDropdown = document.getElementById('miniDropdown');
      const modalOverlay = document.getElementById('modalOverlay');
      const modalInput = document.getElementById('modalInput');
      const modalLabel = document.getElementById('modalLabel');
      const contextMenu = document.getElementById('contextMenu');
      const searchInput = document.getElementById('searchInput');
      const searchDropdownBar = document.getElementById('searchDropdownBar');
      const searchToggleBtn = document.getElementById('searchToggleBtn');
      const explorerMoreBtn = document.getElementById('explorerMoreBtn');
      const explorerMoreDropdown = document.getElementById('explorerMoreDropdown');

      const STORAGE_KEY = 'fcet_fs_v6';
      let fileSystem = { root: { type: 'folder', children: {} } };
      let currentFilePath = null;
      let selectedTreePath = null;
      let contextTargetPath = null;
      let contextTargetType = null;
      let clipboardPath = null;
      let clipboardAction = null;
      let modalMode = 'file';
      let modalParentPath = 'root';

      function initFS() {
        fileSystem = { root: { type: 'folder', children: {} } };
      }

      function loadFS() {
        try {
          const s = localStorage.getItem(STORAGE_KEY);
          if (s) { 
            const parsed = JSON.parse(s);
            if (parsed && parsed.root && parsed.root.type === 'folder') {
              fileSystem = parsed;
              if (!fileSystem.root.children) {
                fileSystem.root.children = {};
              }
            } else {
              initFS();
            }
          } else {
            initFS();
          }
        } catch(e) { 
          initFS();
        }
      }

      function saveFS() { 
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(fileSystem)); 
        } catch(e) {
          console.error('Save failed:', e);
        }
      }

      function ensureChildren(node) {
        if (node && node.type === 'folder' && !node.children) {
          node.children = {};
        }
      }

      function getNode(path) {
        if (!path || path === 'root') {
          ensureChildren(fileSystem.root);
          return fileSystem.root;
        }
        const parts = path.split('/').filter(function(p) { return p.length > 0; });
        let node = fileSystem.root;
        ensureChildren(node);
        for (var i = 0; i < parts.length; i++) {
          var p = parts[i];
          if (!node.children || !node.children[p]) return null; 
          node = node.children[p];
          ensureChildren(node);
        }
        return node;
      }

      function getParentPath(path) { 
        if (!path || path === 'root') return 'root';
        const p = path.split('/').filter(function(p) { return p.length > 0; });
        p.pop(); 
        return p.length === 0 ? 'root' : p.join('/');
      }

      function getFileName(path) { 
        if (!path || path === 'root') return '';
        const p = path.split('/').filter(function(p) { return p.length > 0; });
        return p[p.length-1] || ''; 
      }

      function getFileIconClass(name) {
        if (!name) return 'default';
        const ext = name.split('.').pop().toLowerCase();
        return { html:'html', css:'css', js:'js', py:'python', md:'markdown', json:'json' }[ext] || 'default';
      }

      function openExplorer() {
        explorerOverlay.classList.add('open');
        explorerBackdrop.classList.add('active');
      }

      function closeExplorer() {
        explorerOverlay.classList.remove('open');
        explorerBackdrop.classList.remove('active');
      }

      function renderTree(filter) {
        filter = filter || '';
        explorerTree.innerHTML = '';
        ensureChildren(fileSystem.root);
        const rootChildren = Object.keys(fileSystem.root.children);
        if (rootChildren.length === 0) {
          explorerTree.innerHTML = '<div class="watermark">📂 Let\'s Get Started<br><small>Create a file or folder</small></div>';
          return;
        }
        renderNode(fileSystem.root, 'root', explorerTree, 0, filter.toLowerCase());
      }

      function renderNode(node, path, container, level, filter) {
        ensureChildren(node);
        const entries = Object.entries(node.children).sort(function(a,b) {
          if (a[1].type === 'folder' && b[1].type !== 'folder') return -1;
          if (a[1].type !== 'folder' && b[1].type === 'folder') return 1;
          return a[0].localeCompare(b[0]);
        });
        for (var i = 0; i < entries.length; i++) {
          var name = entries[i][0];
          var item = entries[i][1];
          if (filter && !name.toLowerCase().includes(filter)) continue;
          var itemPath = path === 'root' ? name : path + '/' + name;
          var isFolder = item.type === 'folder';
          var wrapper = document.createElement('div');
          var itemDiv = document.createElement('div');
          itemDiv.className = 'tree-item' + (currentFilePath === itemPath ? ' active' : '');
          itemDiv.setAttribute('data-path', itemPath);
          itemDiv.style.paddingLeft = (level * 1 + 0.5) + 'rem';

          if (isFolder) {
            itemDiv.innerHTML = '<i class="arrow fas fa-chevron-right"></i><i class="folder-icon fas fa-folder"></i> ' + esc(name);
          } else {
            var ic = getFileIconClass(name);
            itemDiv.innerHTML = '<span style="width:1rem;display:inline-block;"></span><i class="file-icon ' + ic + ' fas fa-file-code"></i> ' + esc(name);
          }
          
          var td = document.createElement('span');
          td.className = 'three-dot';
          td.innerHTML = '<i class="fas fa-ellipsis-v"></i>';
          td.onclick = (function(path, type) {
            return function(e) {
              e.stopPropagation();
              contextTargetPath = path;
              contextTargetType = type;
              var rect = td.getBoundingClientRect();
              var menuWidth = 160;
              showContextMenu(rect.left - menuWidth - 10, rect.top);
            };
          })(itemPath, item.type);
          
          itemDiv.appendChild(td);
          itemDiv.onclick = (function(pth, isFolder) {
            return function(e) {
              if (e.target.closest('.three-dot')) return;
              if (isFolder) {
                var arr = itemDiv.querySelector('.arrow');
                arr.classList.toggle('expanded');
                var cd = wrapper.querySelector(':scope > .tree-children');
                if (cd) cd.style.display = cd.style.display === 'none' ? 'block' : 'none';
              } else { 
                openFile(pth); 
                closeExplorer(); 
              }
              selectedTreePath = pth;
            };
          })(itemPath, isFolder);
          
          wrapper.appendChild(itemDiv);
          if (isFolder) {
            var cd = document.createElement('div');
            cd.className = 'tree-children';
            cd.style.display = 'block';
            wrapper.appendChild(cd);
            renderNode(item, itemPath, cd, level + 1, filter);
          }
          container.appendChild(wrapper);
        }
      }

      function esc(s) { 
        if (!s) return '';
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); 
      }

      function openFile(path) {
        if (currentFilePath) { 
          var pn = getNode(currentFilePath); 
          if (pn && pn.type === 'file') {
            pn.content = editor.value; 
          }
        }
        var node = getNode(path);
        if (!node || node.type !== 'file') return;
        currentFilePath = path;
        editor.value = node.content || '';
        pathText.textContent = path;
        saveFS();
        renderTree(searchInput.value);
        editor.focus();
      }

      function showModal(mode, parentPath) {
        modalMode = mode; 
        modalParentPath = parentPath || 'root';
        
        var parent = getNode(modalParentPath);
        if (parent && parent.type === 'folder') {
          modalLabel.textContent = mode === 'file' ? 'New File' : 'New Folder';
          modalInput.value = mode === 'file' ? 'untitled.txt' : 'new-folder';
          modalOverlay.classList.add('active');
          setTimeout(function() {
            modalInput.focus(); 
            modalInput.select();
          }, 100);
        } else {
          alert('Cannot create item here. Select a folder first.');
        }
      }
      
      function hideModal() { 
        modalOverlay.classList.remove('active'); 
      }

      function createItem() {
        var name = modalInput.value.trim();
        if (!name) {
          alert('Please enter a name');
          return;
        }
        
        var parent = getNode(modalParentPath);
        if (!parent) {
          alert('Parent folder not found: ' + modalParentPath);
          return;
        }
        
        if (parent.type !== 'folder') {
          alert('Cannot create item in a file');
          return;
        }
        
        ensureChildren(parent);
        
        if (parent.children[name]) {
          alert('Name already exists');
          return;
        }
        
        if (modalMode === 'file') { 
          parent.children[name] = { type: 'file', content: '' }; 
        } else { 
          parent.children[name] = { type: 'folder', children: {} }; 
        }
        
        saveFS(); 
        renderTree(searchInput.value); 
        hideModal();
        
        if (modalMode === 'file') {
          var newPath = modalParentPath === 'root' ? name : modalParentPath + '/' + name;
          openFile(newPath);
        }
      }

      document.getElementById('modalConfirm').onclick = createItem;
      document.getElementById('modalCancel').onclick = hideModal;
      modalOverlay.onclick = function(e) { 
        if (e.target === modalOverlay) hideModal(); 
      };

      modalInput.onkeydown = function(e) {
        if (e.key === 'Enter') {
          createItem();
        } else if (e.key === 'Escape') {
          hideModal();
        }
      };

      function deleteItem(path) {
        if (!path || path === 'root') return;
        var name = getFileName(path);
        if (!confirm('Delete "' + name + '"?')) return;
        var pp = getParentPath(path);
        var parent = getNode(pp);
        if (parent && parent.children) {
          delete parent.children[name];
        }
        if (currentFilePath === path) { 
          currentFilePath = null; 
          editor.value = ''; 
          pathText.textContent = 'No file open'; 
        }
        saveFS(); 
        renderTree(searchInput.value);
      }

      function renameItem(path) {
        var node = getNode(path);
        if (!node || path === 'root') return;
        var old = getFileName(path);
        var nn = prompt('Rename:', old);
        if (!nn || nn === old) return;
        var pp = getParentPath(path);
        var parent = getNode(pp);
        if (!parent || !parent.children) return;
        if (parent.children[nn]) { alert('Name exists!'); return; }
        parent.children[nn] = node;
        delete parent.children[old];
        if (currentFilePath === path) { 
          currentFilePath = pp === 'root' ? nn : pp + '/' + nn; 
          pathText.textContent = currentFilePath; 
        }
        saveFS(); 
        renderTree(searchInput.value);
      }

      function copyPathAction(path) { 
        navigator.clipboard.writeText(path).then(function() {
          alert('Path copied!');
        }).catch(function() {
          alert('Failed to copy path');
        });
      }

      function cutItem(path) {
        clipboardPath = path;
        clipboardAction = 'cut';
        alert('Item cut to clipboard');
      }

      function copyItem(path) {
        clipboardPath = path;
        clipboardAction = 'copy';
        alert('Item copied to clipboard');
      }

      function pasteItem(targetPath) {
        if (!clipboardPath || !clipboardAction) {
          alert('Nothing to paste');
          return;
        }
        var sourceNode = getNode(clipboardPath);
        if (!sourceNode) {
          alert('Source item not found');
          return;
        }
        var targetNode = getNode(targetPath);
        if (!targetNode || targetNode.type !== 'folder') {
          alert('Cannot paste here');
          return;
        }
        ensureChildren(targetNode);
        var name = getFileName(clipboardPath);
        var newName = name;
        while (targetNode.children[newName]) {
          var pts = newName.split('.');
          newName = pts[0] + ' (copy).' + (pts[1] || '');
        }
        targetNode.children[newName] = JSON.parse(JSON.stringify(sourceNode));
        
        if (clipboardAction === 'cut') {
          var pp = getParentPath(clipboardPath);
          var parent = getNode(pp);
          if (parent && parent.children) {
            delete parent.children[name];
          }
          clipboardPath = null;
          clipboardAction = null;
        }
        saveFS();
        renderTree(searchInput.value);
        alert('Pasted successfully');
      }

      function shareFile(path) {
        var node = getNode(path);
        if (!node || node.type !== 'file') return;
        if (navigator.share) {
          var blob = new Blob([node.content || ''], { type: 'text/plain' });
          var file = new File([blob], getFileName(path), { type: 'text/plain' });
          navigator.share({
            title: getFileName(path),
            files: [file]
          }).catch(function() {});
        } else {
          alert('Sharing not supported on this browser');
        }
      }

      function downloadFileAction(path) {
        var node = getNode(path);
        if (!node || node.type !== 'file') return;
        var blob = new Blob([node.content || ''], { type: 'text/plain' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url; 
        a.download = getFileName(path); 
        document.body.appendChild(a); 
        a.click(); 
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      function exportFile(path) {
        downloadFileAction(path);
      }

      function buildContextMenu(path, type) {
        var isRoot = (path === 'root');
        var html = '';
        
        if (type === 'folder') {
          if (isRoot) {
            html += '<button class="context-item" data-action="newFile"><i class="fas fa-file-plus"></i> New File</button>';
            html += '<button class="context-item" data-action="newFolder"><i class="fas fa-folder-plus"></i> New Folder</button>';
            html += '<button class="context-item" data-action="importFile"><i class="fas fa-file-import"></i> Import Files</button>';
            html += '<button class="context-item" data-action="rename"><i class="fas fa-pen"></i> Rename</button>';
            html += '<button class="context-item" data-action="copyPath"><i class="fas fa-copy"></i> Copy Path</button>';
            html += '<button class="context-item" data-action="exportFile"><i class="fas fa-file-export"></i> Export</button>';
            html += '<div class="context-separator"></div>';
            html += '<button class="context-item" data-action="delete"><i class="fas fa-trash"></i> Delete</button>';
          } else {
            html += '<button class="context-item" data-action="newFile"><i class="fas fa-file-plus"></i> New File</button>';
            html += '<button class="context-item" data-action="newFolder"><i class="fas fa-folder-plus"></i> New Folder</button>';
            html += '<button class="context-item" data-action="importFile"><i class="fas fa-file-import"></i> Import Files</button>';
            html += '<button class="context-item" data-action="copy"><i class="fas fa-copy"></i> Copy</button>';
            html += '<button class="context-item" data-action="cut"><i class="fas fa-cut"></i> Cut</button>';
            if (clipboardPath) {
              html += '<button class="context-item" data-action="paste"><i class="fas fa-paste"></i> Paste</button>';
            }
            html += '<button class="context-item" data-action="rename"><i class="fas fa-pen"></i> Rename</button>';
            html += '<button class="context-item" data-action="copyPath"><i class="fas fa-copy"></i> Copy Path</button>';
            html += '<button class="context-item" data-action="exportFile"><i class="fas fa-file-export"></i> Export</button>';
            html += '<div class="context-separator"></div>';
            html += '<button class="context-item" data-action="delete"><i class="fas fa-trash"></i> Delete</button>';
          }
        } else if (type === 'file') {
          html += '<button class="context-item" data-action="copy"><i class="fas fa-copy"></i> Copy</button>';
          html += '<button class="context-item" data-action="cut"><i class="fas fa-cut"></i> Cut</button>';
          html += '<button class="context-item" data-action="rename"><i class="fas fa-pen"></i> Rename</button>';
          html += '<button class="context-item" data-action="copyPath"><i class="fas fa-copy"></i> Copy Path</button>';
          html += '<button class="context-item" data-action="share"><i class="fas fa-share-alt"></i> Share</button>';
          html += '<button class="context-item" data-action="download"><i class="fas fa-download"></i> Download</button>';
          html += '<button class="context-item" data-action="editAsCode"><i class="fas fa-code"></i> Edit as Code</button>';
          html += '<div class="context-separator"></div>';
          html += '<button class="context-item" data-action="delete"><i class="fas fa-trash"></i> Delete</button>';
        }
        
        return html;
      }

      function showContextMenu(x, y) {
        contextMenu.innerHTML = buildContextMenu(contextTargetPath, contextTargetType);
        contextMenu.style.left = x + 'px';
        contextMenu.style.top = y + 'px';
        contextMenu.classList.add('show');
      }
      
      function hideContextMenu() { 
        contextMenu.classList.remove('show'); 
      }

      contextMenu.onclick = function(e) {
        var actionItem = e.target.closest('.context-item');
        if (!actionItem || !contextTargetPath) return;
        var action = actionItem.getAttribute('data-action');
        
        var node = getNode(contextTargetPath);
        var targetForCreate = contextTargetPath;
        
        if (node && node.type === 'file') {
          targetForCreate = getParentPath(contextTargetPath);
        }
        
        switch(action) {
          case 'newFile': showModal('file', targetForCreate); break;
          case 'newFolder': showModal('folder', targetForCreate); break;
          case 'importFile': importFileTo(targetForCreate); break;
          case 'rename': renameItem(contextTargetPath); break;
          case 'copyPath': copyPathAction(contextTargetPath); break;
          case 'exportFile': exportFile(contextTargetPath); break;
          case 'delete': deleteItem(contextTargetPath); break;
          case 'copy': copyItem(contextTargetPath); break;
          case 'cut': cutItem(contextTargetPath); break;
          case 'paste': pasteItem(contextTargetPath); break;
          case 'share': shareFile(contextTargetPath); break;
          case 'download': downloadFileAction(contextTargetPath); break;
          case 'editAsCode': openFile(contextTargetPath); closeExplorer(); break;
        }
        hideContextMenu();
      };
      
      document.addEventListener('click', function(e) { 
        if (!contextMenu.contains(e.target)) hideContextMenu(); 
      });

      async function importFileTo(parentPath) {
        try {
          var [h] = await window.showOpenFilePicker({ 
            types: [{ 
              accept: { 'text/*': ['.html','.css','.js','.py','.md','.txt','.json','.xml'] } 
            }] 
          });
          var file = await h.getFile();
          var content = await file.text();
          var parent = getNode(parentPath);
          if (parent && parent.type === 'folder') {
            ensureChildren(parent);
            var name = file.name;
            while (parent.children[name]) { 
              var pts = name.split('.'); 
              name = pts[0] + ' (copy).' + (pts[1] || 'txt'); 
            }
            parent.children[name] = { type: 'file', content: content };
            saveFS(); 
            renderTree(searchInput.value); 
            var newPath = parentPath === 'root' ? name : parentPath + '/' + name;
            openFile(newPath);
          }
        } catch(e) { 
          if (e.name !== 'AbortError') alert('Import failed: ' + e.message); 
        }
      }

      function saveCurrent() {
        if (currentFilePath) { 
          var n = getNode(currentFilePath); 
          if (n && n.type === 'file') { 
            n.content = editor.value; 
            saveFS(); 
          } 
        }
      }
      
      function downloadFile(name, content) {
        var b = new Blob([content], { type: 'text/plain' });
        var u = URL.createObjectURL(b);
        var a = document.createElement('a');
        a.href = u; 
        a.download = name; 
        document.body.appendChild(a); 
        a.click(); 
        document.body.removeChild(a);
        URL.revokeObjectURL(u);
      }
      
      function downloadAll() {
        saveCurrent();
        function collect(node) {
          var files = [];
          for (var n in node.children || {}) {
            var item = node.children[n];
            if (item.type === 'file') {
              files.push({ name: n, content: item.content || '' });
            } else {
              files = files.concat(collect(item));
            }
          }
          return files;
        }
        var allFiles = collect(fileSystem.root);
        allFiles.forEach(function(f) { 
          downloadFile(f.name, f.content); 
        });
      }

      function getLang(path) {
        if (!path) return 'text';
        var ext = path.split('.').pop().toLowerCase();
        var langs = { html:'html', css:'css', js:'js', py:'python', md:'markdown' };
        return langs[ext] || 'text';
      }
      
      function genPreview(code, lang) {
        if (lang === 'html' || lang === 'css' || lang === 'js') {
          return '<!DOCTYPE html><html><head><meta charset="UTF-8"><style>' + (lang === 'css' ? code : '') + '</style></head><body>' + (lang === 'html' ? code : '') + '<script>' + (lang === 'js' ? code : '') + '<\/script></body></html>';
        } else if (lang === 'markdown') {
          var h = code.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>');
          h = h.replace(/`([^`]+)`/g,'<code>$1</code>');
          h = h.replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>');
          h = h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');
          return '<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:system-ui;padding:2rem;background:#fff}</style></head><body>' + h.replace(/\n/g,'<br>') + '</body></html>';
        }
        return '<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{white-space:pre-wrap;font-family:monospace;padding:2rem;background:#fff}</style></head><body>' + esc(code) + '</body></html>';
      }
      
      function writeFrame(html) {
        var d = outputFrame.contentDocument || outputFrame.contentWindow.document;
        if (d) { 
          d.open(); 
          d.write(html); 
          d.close(); 
        } else { 
          outputFrame.src = 'about:blank'; 
          outputFrame.onload = function() { 
            var dc = outputFrame.contentDocument || outputFrame.contentWindow.document; 
            if (dc) { 
              dc.open(); 
              dc.write(html); 
              dc.close(); 
            } 
          }; 
        }
      }
      
      async function runPython(code) {
        try {
          if (!window.pyodide) {
            var s = document.createElement('script');
            s.src = 'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js';
            document.head.appendChild(s);
            await new Promise(function(res, rej) { 
              s.onload = res; 
              s.onerror = rej; 
            });
            window.pyodide = await loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/' });
          }
          await window.pyodide.runPythonAsync('import sys\nfrom io import StringIO\nsys.stdout = StringIO()');
          await window.pyodide.runPythonAsync(code);
          var out = await window.pyodide.runPythonAsync('sys.stdout.getvalue()');
          writeFrame('<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:monospace;padding:2rem;background:#f8f9ff}</style></head><body>' + esc(out || '✅ Done.') + '</body></html>');
        } catch(e) {
          writeFrame('<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:monospace;padding:2rem;color:red}</style></head><body>❌ ' + esc(e.message || e) + '</body></html>');
        }
      }
      
      function executeRun() {
        saveCurrent();
        var lang = getLang(currentFilePath);
        outputOverlay.classList.add('active');
        if (lang === 'python') {
          runPython(editor.value);
        } else {
          writeFrame(genPreview(editor.value, lang));
        }
      }

      document.getElementById('explorerToggleBtn').onclick = function() {
        if (explorerOverlay.classList.contains('open')) {
          closeExplorer();
        } else {
          openExplorer();
        }
      };

      explorerBackdrop.onclick = closeExplorer;

      searchToggleBtn.onclick = function() {
        searchDropdownBar.classList.toggle('show');
        searchToggleBtn.classList.toggle('active');
        if (searchDropdownBar.classList.contains('show')) {
          searchInput.focus();
        }
      };

      document.addEventListener('click', function(e) {
        if (!searchDropdownBar.contains(e.target) && e.target !== searchToggleBtn && !searchToggleBtn.contains(e.target)) {
          searchDropdownBar.classList.remove('show');
          searchToggleBtn.classList.remove('active');
        }
      });

      searchInput.oninput = function() { 
        renderTree(searchInput.value); 
      };

      document.getElementById('newFileBtn').onclick = function() { showModal('file', 'root'); };
      document.getElementById('newFolderBtn').onclick = function() { showModal('folder', 'root'); };

      explorerMoreBtn.onclick = function(e) {
        e.stopPropagation();
        explorerMoreDropdown.classList.toggle('show');
      };

      document.addEventListener('click', function(e) {
        if (!explorerMoreBtn.contains(e.target)) {
          explorerMoreDropdown.classList.remove('show');
        }
      });

      explorerMoreDropdown.onclick = function(e) {
        var actionItem = e.target.closest('.explorer-more-item');
        if (!actionItem) return;
        var action = actionItem.getAttribute('data-action');
        if (action === 'importFile') {
          importFileTo('root');
        } else if (action === 'undo') {
          document.execCommand('undo');
          editor.focus();
        } else if (action === 'redo') {
          document.execCommand('redo');
          editor.focus();
        }
        explorerMoreDropdown.classList.remove('show');
      };

      editor.oninput = function() { 
        if (currentFilePath) { 
          var n = getNode(currentFilePath); 
          if (n && n.type === 'file') {
            n.content = editor.value; 
          }
        } 
      };

      document.getElementById('runIconBtn').onclick = executeRun;
      document.getElementById('closeOutputBtn').onclick = function() { 
        outputOverlay.classList.remove('active'); 
        editor.focus(); 
      };
      
      document.addEventListener('keydown', function(e) { 
        if (e.key === 'Escape' && outputOverlay.classList.contains('active')) { 
          outputOverlay.classList.remove('active'); 
          editor.focus(); 
        } 
      });
      
      editor.addEventListener('keydown', function(e) { 
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { 
          e.preventDefault(); 
          executeRun(); 
        } 
      });

      document.getElementById('moreOptionsBtn').onclick = function(e) { 
        e.stopPropagation(); 
        miniDropdown.classList.toggle('show'); 
      };
      
      document.addEventListener('click', function() { 
        miniDropdown.classList.remove('show'); 
      });
      
      miniDropdown.onclick = function(e) {
        var actionItem = e.target.closest('.mini-item');
        if (!actionItem) return;
        var action = actionItem.getAttribute('data-action');
        if (action === 'save') {
          saveCurrent();
          if (currentFilePath) downloadFile(getFileName(currentFilePath), editor.value);
        } else if (action === 'saveAs') { 
          saveCurrent(); 
          var n = currentFilePath ? getFileName(currentFilePath) : 'file.txt'; 
          var nn = prompt('Save as:', n); 
          if (nn) downloadFile(nn, editor.value); 
        } else if (action === 'delete') {
          if (selectedTreePath || currentFilePath) {
            deleteItem(selectedTreePath || currentFilePath);
          }
        } else if (action === 'downloadAll') {
          downloadAll();
        } else if (action === 'clearEditor') { 
          editor.value = ''; 
          if (currentFilePath) { 
            var node = getNode(currentFilePath); 
            if (node && node.type === 'file') {
              node.content = ''; 
              saveFS(); 
            }
          } 
        }
        miniDropdown.classList.remove('show');
      };

      function moveCursor(dx, dy) {
        var t = editor, p = t.selectionStart, txt = t.value, lines = txt.split('\n');
        var cc = 0, cl = 0, col = 0;
        for (var i = 0; i < lines.length; i++) { 
          if (cc + lines[i].length >= p) { 
            cl = i; 
            col = p - cc; 
            break; 
          } 
          cc += lines[i].length + 1; 
        }
        if (dy) { 
          var nl = Math.max(0, Math.min(lines.length - 1, cl + dy));
          var nc = Math.min(col, lines[nl].length); 
          var np = 0; 
          for (var j = 0; j < nl; j++) np += lines[j].length + 1; 
          np += nc; 
          t.setSelectionRange(np, np); 
        }
        if (dx) { 
          var newPos = Math.max(0, Math.min(txt.length, p + dx)); 
          t.setSelectionRange(newPos, newPos); 
        }
        t.focus();
      }
      
      document.getElementById('arrowUpBtn').onclick = function() { moveCursor(0, -1); };
      document.getElementById('arrowDownBtn').onclick = function() { moveCursor(0, 1); };
      document.getElementById('arrowLeftBtn').onclick = function() { moveCursor(-1, 0); };
      document.getElementById('arrowRightBtn').onclick = function() { moveCursor(1, 0); };
      document.getElementById('undoBtn').onclick = function() { document.execCommand('undo'); editor.focus(); };
      document.getElementById('redoBtn').onclick = function() { document.execCommand('redo'); editor.focus(); };
      document.getElementById('copySelectionBtn').onclick = function() { 
        if (editor.selectionStart !== editor.selectionEnd) {
          document.execCommand('copy'); 
        } else {
          navigator.clipboard.writeText(editor.value); 
        }
        editor.focus(); 
      };
      document.getElementById('cutBtn').onclick = function() { document.execCommand('cut'); editor.focus(); };
      document.getElementById('pasteBtn').onclick = async function() { 
        try { 
          var t = await navigator.clipboard.readText(); 
          editor.setRangeText(t, editor.selectionStart, editor.selectionEnd, 'end'); 
        } catch(e) { 
          document.execCommand('paste'); 
        } 
        editor.focus(); 
      };

      loadFS();
      renderTree();
      editor.value = '';
      pathText.textContent = 'No file open';
    })();
  </script>
</body>
</html>
